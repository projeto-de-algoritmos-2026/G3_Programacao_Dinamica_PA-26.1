<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparador de Vírus</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <section class="hero">
        <h1 style="display:inline;">Comparador de Vírus</h1>
        <a href="https://www.youtube.com/watch?v=9UzXSGU5l6Y">
          <img class="logo" src="assets/umbrella.png"/>
        </a>
      </section>

      <div class="grid">
        <section class="card">
          <div class="preset-row" id="presetRow"></div><br>

          <label for="dnaA" style="display:inline;">Sequência A</label>
          <img class="dna" src="assets/dna.png">
          <textarea id="dnaA" placeholder="Digite uma sequência de DNA com A, C, G ou T. Ou selecione uma amostra."></textarea><br><br>

          <label for="dnaB" style="display:inline;">Sequência B</label>
          <img class="dna" src="assets/dna.png">
          <textarea id="dnaB" placeholder="Digite outra sequência de DNA"></textarea>

          <div class="buttons">
            <button class="primary" id="compareBtn">Comparar</button>
            <button class="secondary" id="clearBtn">Limpar</button>
          </div>

        </section>

        <section class="card">
          <div class="result-box" id="resultBox">
            <h3>Resultado</h3>
            <p>Insira duas sequências para iniciar a análise.</p>
          </div>
        </section>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
