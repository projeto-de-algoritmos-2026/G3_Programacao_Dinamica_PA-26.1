<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comparador de DNAs</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <section class="hero">
        <h1> Comparador de DNAs</h1>
      </section>

      <div class="grid">
        <section class="card">
          <label for="dnaA">Sequência A</label>
          <textarea id="dnaA" placeholder="Digite uma sequência de DNA com A, C, G ou T"></textarea>

          <label for="dnaB" style="margin-top: 12px;">Sequência B</label>
          <textarea id="dnaB" placeholder="Digite outra sequência de DNA"></textarea>

          <div class="buttons">
            <button class="primary" id="compareBtn">Comparar</button>
            <button class="secondary" id="clearBtn">Limpar</button>
          </div>

          <div class="preset-row" id="presetRow"></div>
        </section>

        <section class="card">
          <div class="result-box" id="resultBox">
            <h3>Resultado</h3>
            <p>Insira duas sequências para iniciar a análise.</p>
          </div>
        </section>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
